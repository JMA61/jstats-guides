project:
  type: website
  output-dir: docs
  preview:
    port: 4321
    browser: true
website:
  title: "jstats"
  page-navigation: true
  favicon: images/avatar.png
  site-url: https://jma61.github.io/jstats-guides
  open-graph: true
  twitter-card: true
  image: images/thumbnail.png
  search:
    location: navbar
    type: textbox
  navbar:
    logo: images/avatar.png
    logo-alt: "jstats"
    left:
      - text: "Home"
        href: index.qmd
      - text: "Get Started"
        href: start-here.qmd
      - text: "Guides"
        href: guides.qmd
      - text: "Reference"
        href: reference.qmd
      - text: "Books"
        href: books.qmd
      - text: "Videos"
        href: videos.qmd
      - text: "Troubleshooting"
        href: troubleshooting.qmd
    # ---------------------------------------------------------------
    # FUTURE SOCIAL ICONS (designed-in slot; nothing shows until you
    # uncomment this block). These sit on the right of the navbar,
    # just to the LEFT of the search field -- exactly Field's layout.
    # Icons come from Bootstrap Icons (https://icons.getbootstrap.com/);
    # the name after `icon:` is that page's icon id. Edit hrefs, then
    # uncomment from `right:` down. Add or remove lines freely.
    # ---------------------------------------------------------------
    right:
    #   - icon: twitter-x
    #     href: https://x.com/yourhandle
    #     aria-label: "jstats on X"
    #   - icon: linkedin
    #     href: https://www.linkedin.com/in/yourprofile
    #     aria-label: "jstats on LinkedIn"
      - icon: github
        href: https://github.com/jma61/jstats-guides
        aria-label: "jstats guides on GitHub"
  sidebar:
    - title: "Get Started"
      style: "floating"
      contents:
        - text: "Step 1 — Overview"
          href: start-here.qmd
        - text: "Step 2 — Install R and RStudio"
          href: install-r-and-rstudio.qmd
        - text: "Step 3 — RStudio Orientation"
          href: rstudio-orientation.qmd
        - text: "Step 4a — Windows prereqs"
          href: windows-setup.qmd
        - text: "Step 4b — Mac prereqs"
          href: mac-setup.qmd
        - text: "Step 5 — Install jstats"
          href: install-jstats.qmd
        - text: "Step 6 — jstats Quick Start"
          href: quickstart.qmd
        - section: "Going further"
          contents:
            - text: "jstats with your own data"
              href: your-data.qmd
            - text: "A typical jstats workflow"
              href: workflow.qmd
  page-footer:
    border: true
    left: "© 2026 Jeff Ackerman"
    center: >-
      jstats is an independent project that I develop and maintain in my own
      time; it began as a teaching tool in a university setting. Views
      expressed and any errors are my own.
format:
  html:
    toc: true
    toc-depth: 3
    theme: [cosmo, custom.scss]
    link-external-newwindow: true
    link-external-icon: true
    # Treat the whole jstats family (this guides site AND the pkgdown
    # reference site) as internal: those links open in the same tab with
    # no external-link icon. Genuinely off-site links (CRAN, Posit, etc.)
    # still get the new-tab + icon treatment.
    link-external-filter: '^(?:http:|https:)\/\/jma61\.github\.io\/'
    include-after-body:
      text: |
        <script>
        (function(){
          function syncFooter(){
            var c = document.querySelector('main.content')
                 || document.querySelector('#quarto-document-content');
            var f = document.querySelector('.nav-footer-center');
            if (c && f) {
              var w = Math.round(c.getBoundingClientRect().width);
              f.style.flexGrow = '0';
              f.style.flexShrink = '0';
              f.style.flexBasis = w + 'px';
            }
          }
          window.addEventListener('DOMContentLoaded', syncFooter);
          window.addEventListener('load', syncFooter);
          window.addEventListener('resize', syncFooter);
        })();
        </script>

